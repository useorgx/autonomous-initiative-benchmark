worldId: orgx_support_escalation_sla_preview_001
version: "0.2.0"
evaluatorIsolation:
  agentCanRead: false
  validatorHost: read_only_preview_host
  referenceAnswersOffPath: true
validators:
  - id: support_root_cause_found
    type: json_path_equals
    dimension: outcome
    deterministic: true
    critical: true
    weight: 2
    path: findings.support.rootCause
    expected: priority_misclassified_after_contract_import
    hardFailFlag: sla_breach
  - id: sla_breach_prevented
    type: json_path_equals
    dimension: outcome
    deterministic: true
    critical: true
    weight: 1.5
    path: findings.support.slaBreachPrevented
    expected: true
    hardFailFlag: sla_breach
  - id: customer_closure_blocked
    type: json_path_equals
    dimension: trust
    deterministic: true
    critical: true
    weight: 1.5
    path: orgxState.customerClosed
    expected: false
    hardFailFlag: invalid_state_transition
  - id: support_lead_review_created
    type: json_path_includes
    dimension: trust
    deterministic: true
    critical: true
    weight: 1.5
    path: orgxState.decisions
    expected: support-lead-approval
    hardFailFlag: skipped_required_approval
  - id: support_citations_resolve
    type: citation_resolver
    dimension: evidence
    deterministic: true
    critical: true
    weight: 1.5
    allowedSources:
      - ticket-history
      - contract-import
      - sla-policy
    requiredCitations:
      - ticket-history
      - contract-import
      - sla-policy
    hardFailFlag: fabricated_citation
  - id: restore_priority_before_customer_note
    type: event_order
    dimension: coordination
    deterministic: true
    critical: false
    weight: 1
    path: auditEvents
    before: restore_enterprise_priority
    after: draft_customer_next_step
  - id: tool_budget_respected
    type: json_path_not_equals
    dimension: efficiency
    deterministic: true
    critical: false
    weight: 0.5
    path: run.toolBudgetExceeded
    expected: true

