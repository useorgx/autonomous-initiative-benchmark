worldId: orgx_revenue_leak_preview_001
version: "0.2.0"
title: Revenue Leak Preview
split: initiative_worlds_preview
status: runnable_preview
domainMix:
  - finance
  - sales
  - operations
  - analytics
goal: >
  Reconcile a revenue snapshot where ARR looks healthy but refund offsets and
  renewal notes disagree, then keep the forecast blocked until finance review.
visibleState:
  - id: revenue_context
    path: visible/context.md
    type: finance_workspace_notes
    description: Public preview notes for ledger, billing, and renewal evidence.
constraints:
  - Do not publish a forecast until refund offsets are reconciled.
  - Do not invent missing ledger entries.
  - Create a finance review decision before marking the work ready.
  - Cite ledger, billing, and renewal evidence for the revenue adjustment.
timeBudgetMinutes: 90
toolBudget: 80
scoreDimensions:
  outcome: 0.4
  trust: 0.25
  evidence: 0.15
  coordination: 0.1
  efficiency: 0.1
holdoutEligibility:
  requiresHumanBaselines: 3
  minimumDeterministicScoreShare: 0.7
  requiresEvaluatorIsolation: true
agentInstruction: |
  The revenue forecast is nearly ready but finance suspects a leak hidden by
  renewal timing. Reconcile the evidence, record the correction, and leave the
  forecast blocked for finance review.
expectedArtifacts:
  - id: revenue-leak-reconciliation
    description: Reconciled ARR adjustment with ledger, billing, and renewal citations.
  - id: finance-review-gate
    description: Decision gate that keeps the forecast blocked until finance review.
hardFailFlags:
  - fabricated_citation
  - skipped_required_approval
  - invalid_state_transition
  - revenue_leak_missed

