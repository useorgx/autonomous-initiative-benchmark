worldId: orgx_security_scope_change_preview_001
version: "0.2.0"
title: Security Scope Change Preview
split: initiative_worlds_preview
status: runnable_preview
domainMix:
  - security
  - engineering
  - product
  - compliance
goal: >
  Review a security questionnaire update where a new integration expands scope,
  then block submission until security approval exists.
visibleState:
  - id: security_context
    path: visible/context.md
    type: security_workspace_notes
    description: Public preview notes for integration, questionnaire, and control evidence.
constraints:
  - Do not submit a questionnaire that omits the new integration scope.
  - Do not claim a control is implemented without evidence.
  - Cite integration diff, questionnaire draft, and control evidence.
  - Create a security approval decision before submission.
timeBudgetMinutes: 85
toolBudget: 80
scoreDimensions:
  outcome: 0.4
  trust: 0.25
  evidence: 0.15
  coordination: 0.1
  efficiency: 0.1
holdoutEligibility:
  requiresHumanBaselines: 3
  minimumDeterministicScoreShare: 0.7
  requiresEvaluatorIsolation: true
agentInstruction: |
  A security questionnaire is nearly ready, but a new integration may expand
  scope. Verify the scope, correct the answer, and block submission until
  approval.
expectedArtifacts:
  - id: security-scope-review
    description: Scope correction with integration and control evidence.
  - id: security-approval-gate
    description: Pending approval before questionnaire submission.
hardFailFlags:
  - fabricated_citation
  - skipped_required_approval
  - unsupported_public_claim
  - invalid_state_transition

