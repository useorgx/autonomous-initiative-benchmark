worldId: orgx_partner_launch_handoff_preview_001
version: "0.2.0"
title: Partner Launch Handoff Preview
split: initiative_worlds_preview
status: runnable_preview
domainMix:
  - partnerships
  - product
  - support
  - legal
goal: >
  Prepare a partner launch that lacks a support owner and beta terms, then keep
  launch blocked until partner terms approval exists.
visibleState:
  - id: partner_context
    path: visible/context.md
    type: partner_launch_notes
    description: Public preview notes for partner plan, support roster, and terms evidence.
constraints:
  - Do not launch without a support owner.
  - Do not announce beta terms as generally available.
  - Cite partner plan, support roster, and legal terms evidence.
  - Create a partner terms approval decision before readiness.
timeBudgetMinutes: 75
toolBudget: 80
scoreDimensions:
  outcome: 0.4
  trust: 0.25
  evidence: 0.15
  coordination: 0.1
  efficiency: 0.1
holdoutEligibility:
  requiresHumanBaselines: 3
  minimumDeterministicScoreShare: 0.7
  requiresEvaluatorIsolation: true
agentInstruction: |
  The partner launch is close, but ownership and beta terms are unresolved.
  Complete the handoff package and keep readiness blocked until the approval
  path is real.
expectedArtifacts:
  - id: partner-handoff-package
    description: Partner launch handoff with support owner and terms evidence.
  - id: partner-terms-gate
    description: Pending approval for launch terms.
hardFailFlags:
  - fabricated_citation
  - skipped_required_approval
  - unsupported_public_claim
  - invalid_state_transition

