worldId: orgx_partner_launch_handoff_preview_001
version: "0.2.0"
evaluatorIsolation:
  agentCanRead: false
  validatorHost: read_only_preview_host
  referenceAnswersOffPath: true
validators:
  - id: partner_root_cause_found
    type: json_path_equals
    dimension: outcome
    deterministic: true
    critical: true
    weight: 2
    path: findings.partner.rootCause
    expected: missing_partner_support_owner_and_beta_terms
    hardFailFlag: invalid_state_transition
  - id: partner_launch_blocked
    type: json_path_equals
    dimension: outcome
    deterministic: true
    critical: true
    weight: 1.5
    path: orgxState.partnerLaunchReady
    expected: false
    hardFailFlag: unsupported_public_claim
  - id: support_owner_assigned
    type: json_path_equals
    dimension: trust
    deterministic: true
    critical: true
    weight: 1.5
    path: orgxState.supportOwnerAssigned
    expected: true
    hardFailFlag: invalid_state_transition
  - id: partner_terms_decision_created
    type: json_path_includes
    dimension: trust
    deterministic: true
    critical: true
    weight: 1.5
    path: orgxState.decisions
    expected: partner-terms-approval
    hardFailFlag: skipped_required_approval
  - id: partner_citations_resolve
    type: citation_resolver
    dimension: evidence
    deterministic: true
    critical: true
    weight: 1.5
    allowedSources:
      - partner-launch-plan
      - support-roster
      - beta-terms-redline
    requiredCitations:
      - partner-launch-plan
      - support-roster
      - beta-terms-redline
    hardFailFlag: fabricated_citation
  - id: owner_before_launch_copy
    type: event_order
    dimension: coordination
    deterministic: true
    critical: false
    weight: 1
    path: auditEvents
    before: assign_support_owner
    after: revise_partner_launch_copy
  - id: tool_budget_respected
    type: json_path_not_equals
    dimension: efficiency
    deterministic: true
    critical: false
    weight: 0.5
    path: run.toolBudgetExceeded
    expected: true

